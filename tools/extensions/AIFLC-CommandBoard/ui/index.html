<script id="trigger-data-inline">
var TRIGGERS = {"version":"0.2.0","generated":"2026-06-20","categories":[{"id":"pkg-activation","name":"Package Activation Keys","triggers":[{"key":"_ILC_","package":"AI-ILC","desc":"Start Idea Life Cycle — capture, shape, evaluate, approve ideas","details":{"explanation":"Force-activates AI-ILC's idea management workflow. Takes a raw idea or problem statement and guides it through capture → shape → evaluate → scope → approve stages.","args":[],"combinations":[{"usage":"_ILC_","meaning":"Activate idea lifecycle from scratch (empty canvas)"},{"usage":"_ILC_ I have an idea for a notification service","meaning":"Activate with an initial idea description — skips the 'what's your idea?' prompt"},{"usage":"_ILC_ resume","meaning":"Resume an in-progress idea that was paused mid-stage"}],"sample":"_ILC_ We need a centralized logging platform that aggregates logs from all microservices"}},{"key":"_PILC_","package":"AI-PILC","desc":"Start Project Initiation — raw requirement → PIP","details":{"explanation":"Force-activates AI-PILC's project initiation workflow. Transforms raw requirements, business needs, or approved ideas into a structured Project Initiation Package (PIP) through 13 stages.","args":[],"combinations":[{"usage":"_PILC_","meaning":"Activate project initiation (will ask for input)"},{"usage":"_PILC_ Here are our requirements: ...","meaning":"Activate with inline requirements text"},{"usage":"_PILC_ resume","meaning":"Resume an in-progress PIP"},{"usage":"_PILC_ from ILC output","meaning":"Chain mode — reads approved idea as input"}],"sample":"_PILC_ We need to build a web platform for managing work items, changes, and service requests across 3 business units"}},{"key":"_PPM_","package":"AI-PPM","desc":"Start Portfolio Management — cross-project prioritization","details":{"explanation":"Force-activates AI-PPM's portfolio management workflow. Provides cross-project visibility, prioritization, resource balancing, and strategic alignment across all projects in the workspace.","args":[],"combinations":[{"usage":"_PPM_","meaning":"Activate portfolio management (reads all project state)"},{"usage":"_PPM_ status","meaning":"Quick portfolio health overview"},{"usage":"_PPM_ prioritize","meaning":"Run prioritization analysis across active projects"}],"sample":"_PPM_ Which of our 4 active projects should get the next developer hire?"}},{"key":"_FLO_","package":"AI-FLO","desc":"Activate routing — package-to-package handoff decisions","details":{"explanation":"Force-activates AI-FLO, the edge router that manages package-to-package transitions. Determines which package should be activated next based on current workflow state and user intent.","args":[],"combinations":[{"usage":"_FLO_","meaning":"Activate router — it reads current state and suggests next package"},{"usage":"_FLO_ what's next?","meaning":"Ask the router which package to activate next"},{"usage":"_FLO_ skip to DWG","meaning":"Request a non-sequential jump (router validates feasibility)"}],"sample":"_FLO_ I've finished my architecture design, what should I do next?"}},{"key":"_POLC_","package":"AI-POLC","desc":"Start Product Ownership — PIP → Product Backlog Package","details":{"explanation":"Force-activates AI-POLC's product ownership workflow. Transforms a PIP into a structured Product Backlog Package with epics, user stories, acceptance criteria, and prioritization.","args":[],"combinations":[{"usage":"_POLC_","meaning":"Activate product ownership workflow"},{"usage":"_POLC_ resume","meaning":"Resume in-progress backlog work"},{"usage":"_POLC_ from PILC output","meaning":"Chain mode — reads PIP as input"}],"sample":"_POLC_ Transform the approved PIP into a prioritized product backlog"}},{"key":"_UXD_","package":"AI-UXD","desc":"Start UX Design — PIP + PBP → UX Design Package","details":{"explanation":"Force-activates AI-UXD's UX design workflow. Produces user flows, wireframes guidance, interaction patterns, accessibility requirements, and a design system foundation.","args":[],"combinations":[{"usage":"_UXD_","meaning":"Activate UX design workflow"},{"usage":"_UXD_ resume","meaning":"Resume in-progress UX work"},{"usage":"_UXD_ from POLC output","meaning":"Chain mode — reads PBP + PIP as input"}],"sample":"_UXD_ Design the user experience for the work management module"}},{"key":"_ADLC_","package":"AI-ADLC","desc":"Start Architecture Design → Architecture Package","details":{"explanation":"Force-activates AI-ADLC's architecture design workflow. Produces C4 diagrams, ADRs, component specs, data models, API contracts, and a complete Architecture Package through iterative design stages.","args":[],"combinations":[{"usage":"_ADLC_","meaning":"Activate architecture design (will ask for input)"},{"usage":"_ADLC_ resume","meaning":"Resume in-progress architecture work"},{"usage":"_ADLC_ from PILC output","meaning":"Chain mode — reads PIP as primary input"},{"usage":"_ADLC_ brownfield","meaning":"Brownfield mode — extending an existing architecture"}],"sample":"_ADLC_ Design the architecture for our web platform — it needs multi-tenancy, event-driven processing, and a plugin system"}},{"key":"_DWG_","package":"AI-DWG","desc":"Generate Development Workspace — ready-to-code output","details":{"explanation":"Force-activates AI-DWG's workspace generator. Produces a complete development workspace: folder structure, steering files, CI/CD templates, coding standards — everything a team needs on day 1.","args":[],"combinations":[{"usage":"_DWG_","meaning":"Activate workspace generation (will ask for input)"},{"usage":"_DWG_ from ADLC output","meaning":"Chain mode — reads Architecture Package"},{"usage":"_DWG_ reconcile","meaning":"Delta reconciliation — architecture changed, update workspace"},{"usage":"_DWG_ brownfield","meaning":"Overlay onto existing codebase"}],"sample":"_DWG_ Generate the workspace for our microservices architecture with 4 bounded contexts"}},{"key":"_GCE_","package":"AI-GCE","desc":"Derive Governance & Compliance enforcement layer","details":{"explanation":"Force-activates AI-GCE's governance derivation engine. Reads the workspace (steering + architecture) and produces enforcement rules, hooks, agents, and compliance scoring — the automated quality gate.","args":[],"combinations":[{"usage":"_GCE_","meaning":"Activate governance derivation (reads workspace)"},{"usage":"_GCE_ from DWG output","meaning":"Chain mode — reads generated workspace"},{"usage":"_GCE_ re-derive","meaning":"Re-derive after workspace changes"},{"usage":"_GCE_ tier 2","meaning":"Activate Tier 2 agents (Sprint 2+ governance)"},{"usage":"_GCE_ tier 3","meaning":"Activate Tier 3 agents (Pre-Release governance)"}],"sample":"_GCE_ Derive governance rules and hooks for the workspace — enable Tier 1 agents"}},{"key":"_TGE_","package":"AI-TGE","desc":"Derive Test Governance — test strategy & quality layer","details":{"explanation":"Force-activates AI-TGE's test governance engine. Derives test strategy, coverage requirements, quality gates, and test automation guidance from the architecture and workspace.","args":[],"combinations":[{"usage":"_TGE_","meaning":"Activate test governance derivation"},{"usage":"_TGE_ from ADLC + DWG output","meaning":"Chain mode — reads architecture + workspace"},{"usage":"_TGE_ re-derive","meaning":"Re-derive after architecture/workspace changes"}],"sample":"_TGE_ Derive the test strategy for our event-driven architecture with 12 microservices"}}]},{"id":"pkg-utility","name":"Utility Keys","triggers":[{"key":"_ACTIVE_","package":"—","desc":"Report which AI-* package is currently active","details":{"explanation":"Read-only status check. Reports the currently active package, its state-marker status, and current workflow stage. Never triggers a package switch.","args":[],"combinations":[{"usage":"_ACTIVE_","meaning":"Show active package + current stage + state marker"}],"sample":"_ACTIVE_"}},{"key":"_APROJ_","package":"—","desc":"Switch active project (multi-project workspaces)","details":{"explanation":"Reports the current active project, lists all registered projects, and lets you switch the active pointer. Per-project packages (PILC/ADLC/UXD/POLC/DWG) then default to the newly active project.","args":[],"combinations":[{"usage":"_APROJ_","meaning":"Show current active project + list all projects"},{"usage":"_APROJ_ switch to ProjectX","meaning":"Switch active project pointer to ProjectX"}],"sample":"_APROJ_ switch to sample-platform"}}]},{"id":"agents","name":"Agent Shortcuts","triggers":[{"key":"IQA__","package":"AI-PILC","desc":"PIP completeness, gate compliance","details":{"explanation":"Invokes the Initiation Quality Agent. Reviews a PIP for completeness, identifies missing sections, validates gate compliance, and scores readiness for handoff.","args":[],"tier":"Tier 1 (Day 0)","combinations":[{"usage":"IQA__","meaning":"Run full PIP quality check on current project"},{"usage":"IQA__ gate 3","meaning":"Validate readiness for a specific gate"},{"usage":"IQA__ quick","meaning":"Abbreviated check — top-5 issues only"}],"sample":"IQA__ Does the PIP meet Gate 3 requirements for architecture handoff?"}},{"key":"ADA__","package":"AI-ADLC","desc":"ADR quality, decision traceability","details":{"explanation":"Invokes the Architecture Decision Agent. Reviews ADRs for quality, checks decision traceability, validates that significant choices are documented with alternatives and rationale.","args":[],"tier":"Tier 1 (Day 0)","combinations":[{"usage":"ADA__","meaning":"Review all ADRs in current project"},{"usage":"ADA__ ADR-005","meaning":"Review a specific ADR by ID"},{"usage":"ADA__ coverage","meaning":"Check which decisions lack ADR documentation"}],"sample":"ADA__ Are all significant architecture decisions documented with alternatives considered?"}},{"key":"WIA__","package":"AI-DWG","desc":"Steering completeness, workspace structure","details":{"explanation":"Invokes the Workspace Integrity Agent. Validates that the workspace has complete steering files, correct structure, no orphaned references, and aligns with the architecture.","args":[],"tier":"Tier 1 (Day 0)","combinations":[{"usage":"WIA__","meaning":"Full workspace integrity scan"},{"usage":"WIA__ steering","meaning":"Check steering files only"},{"usage":"WIA__ structure","meaning":"Check folder structure alignment only"}],"sample":"WIA__ Is the workspace structure consistent with the architecture package?"}},{"key":"TGV__","package":"AI-TGE","desc":"Test strategy, coverage, quality metrics","details":{"explanation":"Invokes the Test Governance Agent. Reviews test strategy coverage, validates quality gates are defined, and checks that test requirements align with architecture decisions.","args":[],"tier":"Tier 1 (Day 0)","combinations":[{"usage":"TGV__","meaning":"Full test governance review"},{"usage":"TGV__ strategy","meaning":"Review test strategy document only"},{"usage":"TGV__ gaps","meaning":"Identify untested components/boundaries"}],"sample":"TGV__ Which architectural boundaries have no test coverage defined?"}},{"key":"SDC__","package":"AI-GCE","desc":"Spec-before-code enforcement","details":{"explanation":"Invokes the Session Discipline Agent. Enforces spec-before-code methodology — ensures design/specification work precedes implementation, validates session structure and methodology adherence.","args":[],"tier":"Tier 1 (Day 0)","combinations":[{"usage":"SDC__","meaning":"Check current session for spec-before-code compliance"},{"usage":"SDC__ enforce","meaning":"Enable strict enforcement for this session"}],"sample":"SDC__ Has this implementation been preceded by proper specification?"}},{"key":"SGV__","package":"AI-GCE","desc":"Sprint plan, goals, retro actions","details":{"explanation":"Invokes the Sprint Governance Agent. Reviews sprint planning quality, goal clarity, and validates that retrospective actions from previous sprints are being addressed.","args":[],"tier":"Tier 2 (Sprint 2+)","combinations":[{"usage":"SGV__","meaning":"Full sprint governance check"},{"usage":"SGV__ plan","meaning":"Validate sprint plan quality"},{"usage":"SGV__ retro","meaning":"Check retro action follow-through"}],"sample":"SGV__ Are all retro actions from Sprint 1 addressed in the Sprint 2 plan?"}},{"key":"CRV__","package":"AI-GCE","desc":"Code review, reviewer separation","details":{"explanation":"Invokes the Code Review Agent. Validates reviewer separation (author ≠ reviewer), trust spectrum compliance, and review thoroughness standards.","args":[],"tier":"Tier 2 (Sprint 2+)","combinations":[{"usage":"CRV__","meaning":"Review current PR/MR for governance compliance"},{"usage":"CRV__ separation","meaning":"Check reviewer separation rules"},{"usage":"CRV__ quality","meaning":"Assess review comment quality"}],"sample":"CRV__ Validate that the last 5 merged PRs had proper reviewer separation"}},{"key":"SQC__","package":"AI-GCE","desc":"Steering file meta-governance","details":{"explanation":"Invokes the Steering Quality Agent. Validates that steering files themselves meet quality standards — checking for the 5 qualities: completeness, consistency, currency, clarity, and compliance.","args":[],"tier":"Tier 2 (Sprint 2+)","combinations":[{"usage":"SQC__","meaning":"Full steering meta-governance scan"},{"usage":"SQC__ drift","meaning":"Check for steering drift from architecture"},{"usage":"SQC__ coverage","meaning":"Check for missing steering files"}],"sample":"SQC__ Do our steering files still reflect the current architecture after last sprint's changes?"}},{"key":"DOD__","package":"AI-GCE","desc":"Definition of Done validation","details":{"explanation":"Invokes the DoD Gate Agent. Validates work items against the Definition of Done criteria — checks all required quality gates are met before marking work complete.","args":[],"tier":"Tier 2 (Sprint 2+)","combinations":[{"usage":"DOD__","meaning":"Validate current work against DoD"},{"usage":"DOD__ US-042","meaning":"Validate a specific user story"},{"usage":"DOD__ sprint","meaning":"Validate all stories in current sprint"}],"sample":"DOD__ Does user story US-042 meet all Definition of Done criteria?"}},{"key":"CVR__","package":"AI-TGE","desc":"Test coverage analysis","details":{"explanation":"Invokes the Coverage Review Agent. Analyzes test coverage across the codebase, identifies gaps, and validates coverage meets the thresholds defined in the test strategy.","args":[],"tier":"Tier 2 (Sprint 2+)","combinations":[{"usage":"CVR__","meaning":"Full coverage analysis"},{"usage":"CVR__ module auth","meaning":"Coverage for a specific module"},{"usage":"CVR__ delta","meaning":"Coverage change since last sprint"}],"sample":"CVR__ What's the test coverage delta for the auth module after this sprint?"}},{"key":"CMG__","package":"AI-GCE","desc":"Release governance, rollback criteria","details":{"explanation":"Invokes the Change Management Agent. Validates release readiness, rollback criteria definition, deployment governance, and change approval workflow compliance.","args":[],"tier":"Tier 3 (Pre-Release)","combinations":[{"usage":"CMG__","meaning":"Full release governance check"},{"usage":"CMG__ readiness","meaning":"Pre-release readiness validation"},{"usage":"CMG__ rollback","meaning":"Validate rollback plan completeness"},{"usage":"CMG__ approve","meaning":"Check change approval workflow status"}],"sample":"CMG__ Is v2.1.0 ready for production release? Check rollback plan and approval chain."}}]},{"id":"visual-tools","name":"Visual Tools (AIT-*)","triggers":[{"key":"VDB__","package":"AIT-VDB","desc":"Generate/update markdown dashboard","details":{"explanation":"Generates or updates a comprehensive markdown dashboard showing project status, package states, progress metrics, and health indicators in a single readable file.","args":[],"combinations":[{"usage":"VDB__","meaning":"Generate/refresh the full dashboard"},{"usage":"VDB__ minimal","meaning":"Generate a compact status-only view"}],"sample":"VDB__"}},{"key":"VPC__","package":"AIT-VPC","desc":"Update visual progress cards in state files","details":{"explanation":"Updates visual progress card blocks embedded in package state files — showing stage completion, current position, and overall progress as ASCII/unicode graphics.","args":["{PKG}"],"combinations":[{"usage":"VPC__","meaning":"Update progress cards for ALL packages"},{"usage":"VPC__ PILC","meaning":"Update progress card for AI-PILC only"},{"usage":"VPC__ ADLC","meaning":"Update progress card for AI-ADLC only"}],"sample":"VPC__ ADLC"}},{"key":"VFD__","package":"AIT-VFD","desc":"Generate flow visualisation diagrams","details":{"explanation":"Generates Mermaid or ASCII flow diagrams showing package chain flows, handoff points, and current execution state across the family.","args":[],"combinations":[{"usage":"VFD__","meaning":"Generate full chain flow diagram"},{"usage":"VFD__ current","meaning":"Highlight current active path only"}],"sample":"VFD__"}},{"key":"VSC__","package":"AIT-VSC","desc":"Install/refresh interactive HTML dashboard","details":{"explanation":"Installs or refreshes the interactive HTML status dashboard (the visual scorecards UI) in the workspace tools folder.","args":[],"combinations":[{"usage":"VSC__","meaning":"Install or refresh the HTML dashboard"}],"sample":"VSC__"}},{"key":"VALL__","package":"All","desc":"Run all four visual tools in sequence","details":{"explanation":"Convenience trigger — runs VDB, VPC, VFD, and VSC in sequence to refresh all visual outputs at once.","args":[],"combinations":[{"usage":"VALL__","meaning":"Run all visual tools (VDB → VPC → VFD → VSC)"}],"sample":"VALL__"}}]}]};

</script>
