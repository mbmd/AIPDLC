name: Link Check

# Prevents post-publish broken cross-references in the AI-* PDLC Family.
# Runs on every push/PR that touches Markdown, plus weekly to catch external rot.

on:
  push:
    paths:
      - '**/*.md'
  pull_request:
    paths:
      - '**/*.md'
  schedule:
    - cron: '0 6 * * 1'   # Mondays 06:00 UTC
  workflow_dispatch:

jobs:
  markdown-link-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check Markdown links
        uses: lycheeverse/lychee-action@v2
        with:
          args: --no-progress --accept 200,206,429 --exclude 'linkedin\.com' './**/*.md'
          fail: true
